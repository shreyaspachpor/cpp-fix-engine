# QuickFIX Acceptor configuration for CM Trading System
# Clients connect to this on port 5001.

[DEFAULT]
ConnectionType=acceptor
BeginString=FIX.4.2
SenderCompID=EXCHANGE
StartTime=00:00:00
EndTime=00:00:00
HeartBtInt=30
ReconnectInterval=5
FileStorePath=fix_store
FileLogPath=fix_log
ResetOnLogon=Y
UseDataDictionary=N

[SESSION]
BeginString=FIX.4.2
TargetCompID=CLIENT
SocketAcceptPort=5001

[SESSION]
BeginString=FIX.4.2
TargetCompID=CLIENT1
SocketAcceptPort=5001

[SESSION]
BeginString=FIX.4.2
TargetCompID=CLIENT2
SocketAcceptPort=5001
